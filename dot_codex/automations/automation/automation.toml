prompt = "每天查询基金 017641 和 016453 的最新净值数据及公开申购/定投状态，按中国时间当前日期计算定投情况并在当前对话中汇报。定投规则从 2026-05-27 起计算，但每日投入必须按可执行额度取值：017641（摩根标普500指数(QDII)人民币A）计划每日100元，若限购则按 min(100元, 当日公开可购买上限) 计算，目前按10元/日；016453（南方纳斯达克100指数发起(QDII)C）计划每日100元，当前公开监测口径显示限购200元，因此默认按100元/日计算。若公开状态变为暂停申购/禁止购买，或用户明确确认某日实际扣款/定投失败，则该日016453新增投入按0元计算，并在汇报中说明是公开状态导致还是用户实际渠道反馈导致。按每个交易日/可用净值日的基金净值计算买入份额；如遇非交易日、QDII延迟或当天净值尚未公布，说明使用的最新可用净值日期。输出时必须包含基金代码和基金名称。输出两个口径：1）已确认净值/份额口径：两个基金分别的已确认本金、当前市值、收益金额、收益率，以及合计；2）含待确认扣款口径：从 2026-05-27 起按每日实际/可执行扣款计算全部本金，未确认份额的扣款按待确认资金处理，输出两个基金分别的全部本金、当前市值/待确认合计、收益金额、收益率，以及合计。请用简洁中文说明数据口径，并备注当日申购限制。"
